<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>良美眼鏡 - 線上預約</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .date-cell.selected { background-color: #1e40af !important; color: white !important; font-weight: bold; }
        .date-cell.disabled { color: #d1d5db; cursor: not-allowed; background-color: #f9fafb; text-decoration: line-through; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mb-4"></div>
        <p class="text-sm text-slate-600 font-bold tracking-wider" id="loading-text">處理中，請稍候...</p>
    </div>

    <!-- 頂部導覽 -->
    <header class="bg-white border-b sticky top-0 z-50 shadow-sm h-16 flex items-center">
        <div class="max-w-md mx-auto w-full px-4 flex items-center justify-between">
            <div class="flex items-center space-x-2 text-blue-800 cursor-pointer" onclick="goHome()">
    <img src="logo.png" alt="良美眼鏡" class="h-8 w-8 object-contain rounded-full shadow-sm">
    <span class="font-bold text-slate-800 tracking-tight text-lg">良美眼鏡</span>
</div>
            <div id="line-status" class="text-[10px] font-bold bg-gray-100 text-gray-400 px-2 py-1 rounded-full flex items-center">
                <i class="fa-solid fa-circle-nodes mr-1 animate-pulse"></i>載入中
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 pt-6 pb-24">
        <!-- Step 0 -->
        <div id="step-0" class="step-content active text-center">
            <div class="mb-10 mt-8">
                <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                    <i class="fa-solid fa-eye text-5xl text-blue-800"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">歡迎來到良美眼鏡</h2>
                <p class="text-slate-500 text-sm">專業驗光與配鏡，守護您的靈魂之窗</p>
            </div>
            <div class="space-y-4 px-2">
                <button onclick="startBooking()" class="w-full bg-blue-800 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-900 transition-all flex items-center justify-center text-lg">
                    <i class="fa-solid fa-calendar-plus mr-3"></i> 立即預約
                </button>
                <button onclick="startQuery()" class="w-full bg-white text-blue-800 border-2 border-blue-100 font-bold py-4 rounded-2xl shadow-sm hover:bg-blue-50 transition-all flex items-center justify-center text-lg">
                    <i class="fa-solid fa-magnifying-glass mr-3"></i> 查詢 / 取消預約
                </button>
            </div>
        </div>

        <!-- 查詢頁面 -->
        <div id="step-query" class="step-content">
            <h2 class="text-xl font-bold text-slate-800 mb-2">查詢您的預約</h2>
            <p class="text-slate-500 mb-6 text-sm">請輸入您預約時留下的手機號碼。</p>
            <div class="bg-white rounded-2xl p-6 shadow-sm mb-6 border border-slate-100">
                <label class="block text-sm font-bold text-slate-700 mb-2">手機號碼</label>
                <input type="tel" id="query-phone" placeholder="例如: 0912345678" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-800 mb-4 transition-all">
                <button onclick="executeQuery()" class="w-full bg-blue-800 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-blue-900 transition-all">送出查詢</button>
            </div>
            <div id="query-results" class="space-y-4 hidden">
                <h3 class="font-bold text-slate-700 text-sm border-b pb-2">近期預約紀錄</h3>
                <div id="results-container" class="space-y-3"></div>
            </div>
        </div>
        
        <!-- Step 1 -->
        <div id="step-1" class="step-content">
            <h2 class="text-xl font-bold text-slate-800 mb-2">第一步：選擇服務</h2>
            <p class="text-slate-500 mb-6 text-sm">請選擇您今日想預約的服務項目：</p>
            <div id="services-list" class="space-y-3">
                <div class="text-center py-10 text-slate-400"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i>載入服務項目中...</div>
            </div>
        </div>

        <!-- Step 2 -->
        <div id="step-2" class="step-content">
            <h2 class="text-xl font-bold text-slate-800 mb-2">第二步：選擇時間</h2>
            <div class="bg-blue-50 text-blue-800 px-4 py-3 rounded-xl mb-6 text-sm font-medium flex items-center shadow-inner">
                <i class="fa-solid fa-circle-info mr-2"></i><span id="selected-service-display">已選項目</span>
            </div>
            <div class="bg-white rounded-2xl p-4 shadow-sm mb-6 border border-slate-100">
                <div class="flex items-center justify-between mb-4 px-2">
                    <button onclick="changeMonth(-1)" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-500 transition-colors"><i class="fa-solid fa-chevron-left"></i></button>
                    <span id="current-month-display" class="font-bold text-slate-800">載入中...</span>
                    <button onclick="changeMonth(1)" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-500 transition-colors"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center mb-2">
                    <div class="text-xs text-red-400 font-medium">日</div><div class="text-xs text-slate-400 font-medium">一</div><div class="text-xs text-slate-400 font-medium">二</div><div class="text-xs text-slate-400 font-medium">三</div><div class="text-xs text-slate-400 font-medium">四</div><div class="text-xs text-slate-400 font-medium">五</div><div class="text-xs text-slate-400 font-medium">六</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
            </div>
            <h3 class="text-sm font-bold text-slate-600 mb-3 ml-1">可預約時段</h3>
            <div id="time-slots-grid" class="grid grid-cols-3 gap-3">
                <p class="col-span-3 text-center py-6 text-slate-400 text-sm bg-slate-50 rounded-xl border border-dashed border-slate-200">請先選擇上方日期</p>
            </div>
        </div>

        <!-- Step 3 -->
        <div id="step-3" class="step-content">
            <h2 class="text-xl font-bold text-slate-800 mb-2">最後一步：填寫資料</h2>
            <p class="text-slate-500 mb-6 text-sm">請留下您的聯絡方式，以便發送通知。</p>
            <div class="bg-white rounded-2xl p-6 shadow-sm space-y-5 border border-slate-100">
                <div><label class="block text-sm font-bold text-slate-700 mb-2">預約姓名</label><input type="text" id="user-name" placeholder="請填入配鏡 / 檢查者" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-800 transition-all"></div>
                <div><label class="block text-sm font-bold text-slate-700 mb-2">手機號碼</label><input type="tel" id="user-phone" placeholder="0912345678" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-800 transition-all"></div>
                <div><label class="block text-sm font-bold text-slate-700 mb-2">需求備註 (選填)</label><textarea id="user-note" rows="3" placeholder="是否特殊狀況或指定驗光師？" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-800 transition-all"></textarea></div>
            </div>
            <button onclick="submitBooking()" class="w-full mt-8 bg-blue-800 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-900 transition-all text-lg">確認預約</button>
        </div>

        <!-- Step 4 -->
        <div id="step-4" class="step-content text-center py-10">
            <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><i class="fa-solid fa-check text-5xl"></i></div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">預約成功！</h2>
            <p class="text-slate-500 mb-8 px-4 text-sm leading-relaxed">我們已為您保留時段。<br>稍後將透過 LINE 發送確認通知。</p>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 text-left mb-8 mx-2">
                <div class="flex justify-between border-b border-slate-50 pb-3 mb-3"><span class="text-slate-400 text-sm">預約項目</span><span id="final-service" class="font-bold text-slate-800 text-sm"></span></div>
                <div class="flex justify-between border-b border-slate-50 pb-3 mb-3"><span class="text-slate-400 text-sm">日期時間</span><span id="final-time" class="font-bold text-blue-700 text-sm"></span></div>
                <div class="flex justify-between"><span class="text-slate-400 text-sm">門市位置</span><span class="font-bold text-slate-800 text-sm">良美眼鏡</span></div>
            </div>
            <button onclick="location.reload()" class="text-blue-600 font-bold hover:underline bg-blue-50 px-6 py-2 rounded-full transition-colors">回首頁</button>
        </div>
    </main>

    <div id="footer-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] hidden z-40">
        <div class="max-w-md mx-auto flex justify-between items-center px-2">
            <button onclick="prevStep()" class="flex items-center text-slate-500 font-medium hover:text-slate-800 transition-colors"><i class="fa-solid fa-chevron-left mr-2"></i> 返回</button>
        </div>
    </div>

    <!-- === API 與邏輯區塊 === -->
    <script>
        // 🌟🌟🌟 請將這裡換成您「剛剛複製的 Google Apps Script 網址」 🌟🌟🌟
        const YOUR_GAS_URL = 'https://script.google.com/macros/s/AKfycbxAXU0WFIhrxEPNPCcYjw72fOJQWMNdmufUpH18-PEiJj32_e3lS8DVxW3onKyUM5mO-Q/exec'; 
        
        const MY_LIFF_ID = '2008736713-B5dIp92d'; 
        let bookingData = { service: '', duration: 0, date: '', time: '', name: '', phone: '', note: '', lineId: '' };
        let currentStep = 0; 
        let systemSettings = null; 
        let currentDate = new Date(); 

        // 【全新 API 呼叫器】取代原本會卡死的 google.script.run
        async function callAPI(actionName, payloadData = {}) {
            try {
                const response = await fetch(YOUR_GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: actionName, payload: payloadData }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' } // 使用 text/plain 繞過 CORS
                });
                return await response.json();
            } catch (error) {
                console.error("API 錯誤:", error);
                throw error;
            }
        }

        function updateStatusBadge(type, message = '') {
            const badge = document.getElementById('line-status');
            if (type === 'success') {
                badge.className = "text-[10px] font-bold bg-green-100 text-green-700 px-2 py-1 rounded-full flex items-center";
                badge.innerHTML = '<i class="fa-brands fa-line mr-1 text-xs"></i>已連線';
            } else if (type === 'error') {
                badge.className = "text-[10px] font-bold bg-red-100 text-red-600 px-2 py-1 rounded-full flex items-center";
                badge.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1"></i>連線異常';
            }
        }

        window.onload = async function() {
            // 1. 啟動 LIFF
            liff.init({ liffId: MY_LIFF_ID })
                .then(() => {
                    if (!liff.isLoggedIn()) liff.login();
                    else return liff.getProfile();
                })
                .then(profile => {
                    if (profile) {
                        bookingData.lineId = profile.userId;
                        updateStatusBadge('success');
                    }
                })
                .catch(err => {
                    updateStatusBadge('error');
                    console.error("LIFF 錯誤", err);
                });

            // 2. 透過 API 取得後台設定
            try {
                const settings = await callAPI('getSettings');
                if(settings && !settings.error) {
                    systemSettings = settings;
                    renderServices(settings);
                } else {
                    alert("載入後台失敗: " + settings.error);
                }
            } catch(e) {
                console.warn("無法連線後台", e);
            }
        };

        function showLoading(show, text = "處理中...") {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
            document.getElementById('loading-text').innerText = text;
        }

        // --- 介面控制 ---
        function goHome() { currentStep = 0; bookingData = { ...bookingData, service: '', duration: 0, date: '', time: '', name: '', phone: '', note: '' }; updateUI(); }
        function startBooking() { if(!systemSettings) return; currentStep = 1; updateUI(); }
        function startQuery() { currentStep = 'query'; document.getElementById('query-results').classList.add('hidden'); document.getElementById('query-phone').value = ''; updateUI(); }
        function nextStep() { if (currentStep < 4) { currentStep++; updateUI(); } }
        function prevStep() { if (currentStep === 'query') goHome(); else if (currentStep > 0) { currentStep--; updateUI(); } }

        function updateUI() {
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            if(typeof currentStep === 'number') {
                document.getElementById(`step-${currentStep}`).classList.add('active');
                document.getElementById('footer-nav').classList.toggle('hidden', currentStep < 1 || currentStep > 3);
                if (currentStep === 2) {
                    document.getElementById('selected-service-display').innerText = `${bookingData.service} (${bookingData.duration}分鐘)`;
                    renderCalendar();
                }
            } else if (currentStep === 'query') {
                document.getElementById('step-query').classList.add('active');
                document.getElementById('footer-nav').classList.remove('hidden');
            }
            window.scrollTo(0, 0); 
        }

        function renderServices(settings) {
            const list = document.getElementById('services-list');
            if(!settings.services || settings.services.length === 0) return list.innerHTML = '<p class="text-center py-10 text-slate-400">目前尚無開放服務</p>';
            list.innerHTML = settings.services.map(s => `
                <button onclick="selectService('${s.name}', ${s.duration})" class="w-full text-left bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:border-blue-600 transition-all flex justify-between items-center group">
                    <h3 class="font-bold text-slate-800 group-hover:text-blue-800 transition-colors">${s.name}</h3>
                    <div class="flex items-center text-slate-400 group-hover:text-blue-600">
                        <span class="text-xs font-medium mr-2">${s.duration} 分鐘</span><i class="fa-solid fa-chevron-right text-xs"></i>
                    </div>
                </button>
            `).join('');
        }

        function selectService(name, dur) { bookingData.service = name; bookingData.duration = dur; nextStep(); }
        function changeMonth(delta) { currentDate.setMonth(currentDate.getMonth() + delta); bookingData.date = ''; renderCalendar(); }

        function checkDateAvailability(cellDateObj, dateStr) {
            const today = new Date(); today.setHours(0,0,0,0);
            const maxDate = new Date(today); maxDate.setDate(today.getDate() + (systemSettings.config.advancedDays || 30));
            if (cellDateObj < today || cellDateObj > maxDate) return false;
            if (systemSettings.specialDates) {
                const special = systemSettings.specialDates.find(d => d.date === dateStr);
                if (special) return special.isOpen; 
            }
            const dayName = ['週日','週一','週二','週三','週四','週五','週六'][cellDateObj.getDay()];
            if (systemSettings.schedule) {
                const sched = systemSettings.schedule.find(s => s.day === dayName);
                if (sched) return sched.isOpen;
            }
            return false;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const year = currentDate.getFullYear(); const month = currentDate.getMonth();
            document.getElementById('current-month-display').innerText = `${year}年 ${month + 1}月`;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date(); today.setHours(0,0,0,0);

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cellDate = new Date(year, month, day);
                cell.innerText = day;
                cell.className = "date-cell p-2 text-sm rounded-lg text-center transition-colors";
                
                if (!checkDateAvailability(cellDate, dateStr)) {
                    cell.classList.add('disabled');
                } else {
                    cell.classList.add('cursor-pointer', 'text-slate-700', 'hover:bg-blue-50');
                    if(cellDate.getTime() === today.getTime()) cell.classList.add('bg-slate-100', 'font-bold');
                    if(bookingData.date === dateStr) cell.classList.add('selected');
                    cell.onclick = () => {
                        document.querySelectorAll('.date-cell').forEach(c => c.classList.remove('selected'));
                        cell.classList.add('selected'); bookingData.date = dateStr; fetchTimes(dateStr);
                    };
                }
                grid.appendChild(cell);
            }
        }

        async function fetchTimes(dateStr) {
            showLoading(true, "尋找空檔中...");
            try {
                const slots = await callAPI('getSlots', { dateStr: dateStr, serviceName: bookingData.service });
                renderTimeSlots(slots);
            } catch(e) {
                alert("讀取時段失敗");
            } finally {
                showLoading(false);
            }
        }

        function renderTimeSlots(slots) {
            const grid = document.getElementById('time-slots-grid');
            grid.innerHTML = '';
            if (!slots || slots.length === 0) return grid.innerHTML = '<p class="col-span-3 text-center py-6 text-red-500 text-sm">該日已額滿</p>';
            slots.forEach(time => {
                const btn = document.createElement('button'); btn.innerText = time;
                btn.className = "py-3.5 text-sm font-bold border border-slate-200 bg-white text-slate-700 rounded-xl hover:bg-blue-800 hover:text-white transition-all";
                btn.onclick = () => { bookingData.time = time; nextStep(); }; grid.appendChild(btn);
            });
        }

        async function submitBooking() {
            bookingData.name = document.getElementById('user-name').value.trim();
            bookingData.phone = document.getElementById('user-phone').value.trim();
            bookingData.note = document.getElementById('user-note').value.trim();
            if (!bookingData.name || !bookingData.phone) return alert('請填寫姓名與電話');

            showLoading(true, "建立預約...");
            try {
                const res = await callAPI('submitBooking', bookingData);
                if(res.success) {
                    document.getElementById('final-service').innerText = bookingData.service;
                    document.getElementById('final-time').innerText = `${bookingData.date} ${bookingData.time}`;
                    nextStep();
                } else {
                    alert('預約失敗：' + res.msg); currentStep = 2; updateUI(); 
                }
            } catch(e) { alert("送出失敗"); } finally { showLoading(false); }
        }

        async function executeQuery() {
            const phone = document.getElementById('query-phone').value.trim();
            if (!phone) return alert('請輸入電話');
            showLoading(true, "查詢中...");
            try {
                const results = await callAPI('queryBookings', { phone: phone });
                renderQueryResults(results);
            } catch(e) { alert("查詢失敗"); } finally { showLoading(false); }
        }

        function renderQueryResults(results) {
            const container = document.getElementById('results-container');
            document.getElementById('query-results').classList.remove('hidden');
            if (!results || results.length === 0) return container.innerHTML = '<div class="text-center py-6 text-slate-500 text-sm">查無紀錄</div>';
            container.innerHTML = results.map(b => `
                <div class="bg-white border p-4 rounded-xl shadow-sm mb-3">
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-bold text-blue-700 bg-blue-50 px-2 rounded">${b.service}</span>
                        <button onclick="cancelBooking('${b.id}')" class="text-xs text-red-500 font-bold">取消</button>
                    </div>
                    <div class="font-bold text-lg">${b.date}</div><div class="text-slate-500 text-sm">${b.time}</div>
                </div>
            `).join('');
        }

        async function cancelBooking(id) {
            if(confirm('確定要取消嗎？')) {
                showLoading(true, "取消中...");
                try {
                    const res = await callAPI('cancelBooking', { bookingId: id });
                    if(res.success) { alert('已取消'); executeQuery(); } else alert('取消失敗');
                } catch(e) { alert("發生錯誤"); } finally { showLoading(false); }
            }
        }
    </script>
</body>
</html>
